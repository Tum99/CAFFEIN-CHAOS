<h1>Admin Dashboard</h1>

<h2>Categories</h2>
<ul>
    {% for category in categories %}
        <li>{{ category.name }}</li>
    {% endfor %}
</ul>

<h2>Products</h2>
<ul>
    {% for product in products %}
        <li>
            {{ product.name }} - {{ product.category.name }}
        </li>
    {% endfor %}
</ul>

<a href="{{ url_for('admin.add_category') }}">Add Category</a>
<a href="{{ url_for('admin.add_product') }}">Add Product</a>
