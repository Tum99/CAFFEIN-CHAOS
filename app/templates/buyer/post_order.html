{% extends "base.html" %}

{% block title %}Post Order | Buyer Dashboard{% endblock %}

{% block content %}
<h2>Post a New Order</h2>
<form method="POST">
    <label>Title:</label>
    <input type="text" name="title" required>

    <label>Description:</label>
    <textarea name="description" required></textarea>

    <button type="submit">Submit Order</button>
</form>
{% endblock %}
